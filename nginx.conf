# Colocar em: /etc/nginx/sites-available/agitare
# Ativar com: ln -s /etc/nginx/sites-available/agitare /etc/nginx/sites-enabled/agitare
# SSL via Certbot depois: certbot --nginx -d www.agitare.com.br -d agitare.com.br

server {
    listen 80;
    server_name www.agitare.com.br agitare.com.br;

    client_max_body_size 20M;

    # Arquivos com hash no nome (ex: products.abc123.css) — cache longo e imutável
    location ~* /static/.+\.[0-9a-f]{8,}\.(css|js|png|svg|woff2?)$ {
        alias /var/www/agitare/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files sem hash — sem cache agressivo para receber atualizações
    location /static/ {
        alias /var/www/agitare/staticfiles/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Suporte a Range requests para o vídeo da hero (scroll-scrub)
    location /static/media/ {
        alias /var/www/agitare/staticfiles/media/;
        expires 7d;
        add_header Accept-Ranges bytes;
    }

    # Proxy para o container Django/Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8001;
    }
}
