# /etc/nginx/sites-available/agitare
# Ativar: ln -s /etc/nginx/sites-available/agitare /etc/nginx/sites-enabled/agitare
# Certificado gerenciado pelo Certbot (Let's Encrypt) — não remover os blocos SSL

server {
    server_name www.agitare.com.br agitare.com.br;

    client_max_body_size 20M;

    # Static files — WhiteNoise gera hashes nos nomes, URLs mudam com o conteúdo
    location /static/ {
        alias /var/www/agitare/staticfiles/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Accept-Ranges bytes;
    }

    # Proxy para o container Django/Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8001;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.agitare.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.agitare.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name www.agitare.com.br agitare.com.br;

    if ($host = www.agitare.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    return 404; # managed by Certbot
}
